		<script type="importmap">

				"imports": {

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { XRButton } from 'three/addons/webxr/XRButton.js';
import { XRControllerModelFactory } from 'three/addons/webxr/XRControllerModelFactory.js';
import { ConvexGeometry } from 'three/addons/geometries/ConvexGeometry.js';

let canvas_width=0.9*window.innerWidth;
let canvas_height=0.9*window.innerHeight;
const renderer = new THREE.WebGLRenderer( { antialias: true } );
  renderer.setPixelRatio( window.devicePixelRatio );
  renderer.setSize( canvas_width, canvas_height );
  renderer.xr.enabled = true;
  renderer.xr.setReferenceSpaceType( 'local' );
  renderer.setAnimationLoop( animate );
  canvas.appendChild( renderer.domElement );


const XRButt=XRButton.createButton( renderer );
  document.body.appendChild( XRButt);

const scene = new THREE.Scene();
  scene.background = new THREE.Color( 0xcccc66 );

const light = new THREE.HemisphereLight();//( 0xfff0f0, 0x606066 );
//  light.position.set( 1, 1, 1 );
  scene.add( light );

const directionalLight = new THREE.DirectionalLight( 0xffeeee, 1 );
  directionalLight.position.set(-40,-1,0);
  scene.add( directionalLight );

const directionalLight2 = new THREE.DirectionalLight( 0xeeffee, 1 );
  directionalLight2.position.set(0,-40,0);
  scene.add( directionalLight2);

const directionalLight3 = new THREE.DirectionalLight( 0xeeeeff, 1 );
  directionalLight3.position.set(40,-1,0);
  scene.add( directionalLight3);

const directionalLight4 = new THREE.DirectionalLight( 0xffffff, 1 );
  directionalLight4.position.set(0,0,40);
  scene.add( directionalLight4);

const directionalLight5 = new THREE.DirectionalLight( 0xffffee, 1 );
  directionalLight5.position.set(0,40,0);
  scene.add( directionalLight5);

const directionalLight6 = new THREE.DirectionalLight( 0xccffff, 1 );
  directionalLight6.position.set(0,0,-40);
  scene.add( directionalLight6);

const camera = new THREE.PerspectiveCamera( 50, canvas_width / canvas_height, 0.1, 500 );
  scene.add( camera );

const controls = new OrbitControls( camera, renderer.domElement );
  controls.listenToKeyEvents( window );
  controls.enableDamping = true;
  controls.dampingFactor = 0.05;
  controls.screenSpacePanning = true; //false = nur horizontal verschiebbar
  controls.minDistance = 0;
  controls.maxDistance = 100;
  controls.maxPolarAngle = 2*Math.PI / 2;//das geht, original 1*
  controls.minPolarAngle = 0;
  controls.target.set(0,0.5,0);
  controls.object.position.set(0,0.5,1.5);

const controller1 = renderer.xr.getController( 0 );
  controller1.addEventListener( 'selectstart', onSelectStart );
  scene.add( controller1 );

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector3();
const Flaechen = new THREE.Object3D();
  scene.add(Flaechen);

function raycast() {
  const intersects = raycaster.intersectObjects(Flaechen.children);
  for (let i = 0; i < intersects.length; i++) {
    intersects[i].object.material.color.set(0x00ff00);
    Tdok.innerHTML=intersects[i].object.userData.tdok;
    }
  //Log.innerHTML=JSON.stringify(Ecken)
  let Dist = 0;
  let minDist = 100000;
  let gefunden = 0;
  for (let i = 0; i < Ecken.length; i++) {
    Dist = raycaster.ray.direction.angleTo(Ecken[i].position.clone().sub(raycaster.ray.origin))
    if (Dist < minDist) { minDist = Dist; gefunden = Ecken[i].position }
    }
  Log.innerHTML = JSON.stringify(gefunden);
  controllerTarget.position.copy(gefunden);
  }

function onClick(event) {
  // calculate pointer position in normalized device coordinates, (-1 to +1) for both components
  pointer.x = ( (event.clientX-event.target.getBoundingClientRect().left) / canvas_width) * 2 - 1;
  pointer.y = - ( (event.clientY-event.target.getBoundingClientRect().top) / canvas_height) * 2 + 1;
  pointer.z = 1;
  raycaster.setFromCamera(pointer, camera);
  raycast();
  }
//window.addEventListener('pointermove', onPointerMove);
renderer.domElement.addEventListener('click', onClick);

function onSelectStart( event ) {
  const controller = event.target;
  controller.updateMatrixWorld();
  raycaster.setFromXRController(controller);
  raycast();
  }

let tdok='';
function Interpretiere(text) {
  let tt=text.split('\n');
  for (let t of tt) {
    //alert(t);
    tdok=t;
    eval(t);
    }
  }

let axisX=new THREE.Vector3(1,0,0);
let axisY=new THREE.Vector3(0,1,0);
let axisZ=new THREE.Vector3(0,0,1);

function animate(timestamp,frame) {
  //Drehplattenebene.setRotationFromAxisAngle(axisZ,timestamp/1000*Math.PI/5);
  Schneckenradachse.setRotationFromEuler(new THREE.Euler(0,Math.PI/2,timestamp/1000*Math.PI/5,'XYZ'));
  Kippantriebsachse.setRotationFromEuler(new THREE.Euler(0,Math.PI/2,timestamp/1000*Math.PI/5,'XYZ'));
  Drehtellerachse.setRotationFromEuler(new THREE.Euler(0,0,timestamp/1000*Math.PI/5,'XYZ'));
  controls.update();
  controllerTarget.position.copy(controls.target);
  renderer.render( scene, camera );
  }



let Ecken=[];
let controllerTarget=new THREE.Mesh(
  new THREE.SphereGeometry(0.04,32,32),
  new THREE.MeshStandardMaterial( {color: 'red', transparent:true, opacity:0.8} )
  );
scene.add(controllerTarget);



const Schreibtischebene=new THREE.Object3D();
Schreibtischebene.rotateX(-Math.PI/2);
scene.add(Schreibtischebene);

let Schreibtisch=new THREE.Mesh(
  new THREE.BoxGeometry( 3,1,0.05),
  new THREE.MeshStandardMaterial( {color: 'brown', metalness: 0, roughness: 0.3, transparent:true, opacity:0.9} )
  );
Schreibtisch.userData={txt:'Schreibtisch'};
Schreibtischebene.add(Schreibtisch);
Schreibtisch.position.set(0,0.2,-0.025);//Schreibtischebene-Koordinaten

let P=0.008*4; //8 mm https://de.wikipedia.org/wiki/Datei:Lego_dimensions.svg
let H=1.2*P;
let f=0xeeddcc;

function b(px,py,pz3,dx,dy,dz3) {//Bausteinklötzer mehrere
  let RET=new THREE.Mesh(
    new THREE.BoxGeometry(dx*P,dy*P,dz3/3*H),
    new THREE.MeshStandardMaterial( {color: new THREE.Color(f), metalness: 0, roughness: 0.8, transparent:false, opacity:0.8} )
    );
  RET.position.set((px+dx/2)*P,(py+dy/2)*P,(pz3/3+dz3/6)*H);
  f=(f+0x080808)%0x800000+0x776655;
  //alert(f);
  return RET;
  }
THREE.CylinderGeometry

function a(px,py,pz3,dy) {//Achse
  const RET=new THREE.Object3D();
  const RET2=new THREE.Mesh(
    new THREE.CylinderGeometry(0.2*P,0.2*P,dy*P,6),
    new THREE.MeshStandardMaterial( {color: 'gray', metalness: 0, roughness: 0.8, transparent:false, opacity:0.8} )
    );
  RET2.rotateX(Math.PI/2);
  RET2.position.set(0,0,dy/2*P);
  RET.add(RET2,new THREE.AxesHelper(0.04));
  //RET.rotateZ(Math.PI/2);
  RET.position.set(px*P,py*P,pz3/3*H);
  //alert(f);
  return RET;
  }

const Grundplattenebene=new THREE.Object3D();
const Schneckenradachse=a( 3, 0,  5*3+2,10);
const Kippantriebsachse=a( 3, 10,  5*3+2,8);
const Drehtellerachse=a( 8, 3,  1,8);
Grundplattenebene.position.set(-8*P,-3*P,0.02);
Schreibtischebene.add(Grundplattenebene);
let Grundplatte=b(0,0,-1,16,8,1); Grundplatte.userData={txt:'Grundplatte'};
Grundplattenebene.add(
  new THREE.AxesHelper(0.5),
  Grundplatte,
  b(6,7,0,1,12,5*3),
  b(9,7,0,1,12,5*3),
  b(6,6,5*3,1,16,1*3),
  b(9,6,5*3,1,16,1*3),
  b(0,-2,0,2,4,4*3+1),//Ständer für Motorblock
  b(0, 8,0,2,4,4*3+1),//Ständer für Motorblock
  b(-2,-2,4*3+1,4,4,2*3+2),//Motorblock
  b(-2, 8,4*3+1,4,4,2*3+2),//Motorblock
  b(3,-2,0,2,4,5*3),  //ev.px+1
  b(11,-2,0,2,4,5*3), //ev.px-1
  b( 4,-4,5*3,1,12,3),//linkes Lager für Schneckenachse
  b(11,-4,5*3,1,12,3),//rechtes Lager für Schneckenachse
  b( 2, 6,  0,12,1,5*3),//hintere Stütze für Schneckenlager
  Schneckenradachse,
  Kippantriebsachse,
  Drehtellerachse,
  b(-2,0,7*3,2,10,1),  //verbindet die beiden Motorblöcke
  
  
  
  
  );

const Drehplattenebene=new THREE.Object3D();
Drehplattenebene.position.set(0,0,7.5*H);
//Drehplattenebene.rotateX(Math.PI/2);
Drehtellerachse.add(Drehplattenebene);
Drehplattenebene.add(
  new THREE.AxesHelper(0.3),
  b(-6,-6,-1,12,12,1),
  b( 5,-7, 4, 2,12,1),
  b(-7,-7, 4,12, 2,1),
  b(-7,-5, 4, 2,12,1),
  b(-5, 5, 4,12, 2,1),
  );

  </script></body></html>
